cardiac_period_s: 1.0
n_points: 201
fourier_modes: 20
mode: patient_ultrasound_velocity_example

# Use time-mean Doppler velocity at each inlet plus the measured lumen diameter.
# The generator converts Q_mean = V_mean * area into the inlet .flow file used
# by svMultiPhysics. Keep velocities in cm/s or use mean_velocity_m_s instead.
inlets:
  LICA:
    mean_velocity_cm_s: 11.45
    diameter_mm: 6.8
    pulsatility: 0.45
    phase_rad: 0.0
  RICA:
    mean_velocity_cm_s: 10.74
    diameter_mm: 6.9
    pulsatility: 0.45
    phase_rad: 0.03
  LVA:
    mean_velocity_cm_s: 16.12
    diameter_mm: 3.4
    pulsatility: 0.50
    phase_rad: 0.10
  RVA:
    mean_velocity_cm_s: 15.76
    diameter_mm: 3.3
    pulsatility: 0.50
    phase_rad: 0.12
