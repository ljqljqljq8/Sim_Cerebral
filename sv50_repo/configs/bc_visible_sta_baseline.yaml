truth_bc:
  cardiac_cycle_s: 0.8
  sample_dt_s: 0.001
  inlet_mean_flows_ml_min:
    L_CCA_IN: 270
    R_CCA_IN: 270
    L_VA_IN: 85
    R_VA_IN: 85
  outlet_target_flows_ml_min:
    L_ACA_OUT: 94
    R_ACA_OUT: 94
    L_MCA_OUT: 174
    R_MCA_OUT: 174
    L_PCA_OUT: 67
    R_PCA_OUT: 67
    L_TFA_OUT: 5
    R_TFA_OUT: 5
    L_STA_OUT1: 5
    R_STA_OUT1: 5
    L_STA_OUT2: 4
    R_STA_OUT2: 4
    L_STA_OUT3: 2
    R_STA_OUT3: 2
    L_STA_FB_OUT: 4
    R_STA_FB_OUT: 4
  pressure:
    target_mean_mmHg: 90
    venous_or_distal_mmHg: 10

waveform:
  mode: analytic
  fourier_modes: 16
  carotid:
    systolic_fraction: 0.34
    second_harmonic_fraction: 0.08
    phase_s: 0.0
  vertebral:
    systolic_fraction: 0.24
    second_harmonic_fraction: 0.05
    phase_s: 0.03

rcr:
  proximal_fraction: 0.05
  total_compliance_cm3_per_barye: 1.9e-5

notes:
  - "Visible-STA baseline: external outlets represent explicitly modeled STA/TFA branches only."
  - Do not interpret L_CCA_IN/R_CCA_IN as full physiological CCA flow unless hidden ECA bed outlets are added.
  - CCA inflow equals ICA/CoW inflow plus current explicit STA/TFA branch loss in this geometry.
  - "RCR values use relative pressure: target mean pressure 90 mmHg, distal/venous reference 10 mmHg, deltaP 80 mmHg."
