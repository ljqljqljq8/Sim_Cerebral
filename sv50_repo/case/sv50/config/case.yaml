case:
  name: sv50
  model: cfd_v5_sv50
  unit: cm
  notes:
    - Physiologic visible-STA baseline without changing geometry.
    - CCA inflow includes only the explicit visible STA/TFA branch loss; this is not a full ECA-bed model.
    - Boundary names are short aliases; original names are preserved in face_labels.json.

paths:
  case_dir: case/sv50
  source_root: case/sv50/source
  source_mesh_case: case/sv50/source/sv50
  svmultiphysics_executable: svmultiphysics
  mpiexec: mpiexec
  environment_overrides:
    svmultiphysics_executable: SV_MULTIPHYSICS_BIN
    mpiexec: MPIEXEC

blood:
  density_g_per_cm3: 1.06
  viscosity_poise: 0.04

solver:
  wall: rigid
  equation: fluid
  time_step_s: 0.001
  cardiac_cycle_s: 0.8
  cycles_test: 2
  cycles_production: 5
  save_increment: 20
  restart_increment: 50
  stop_file: STOP_SIM_SV50
  stop_file_resume: STOP_SIM_SV50_RESUME
  boundary_integral_output: true
  nonlinear_min_iterations: 2
  nonlinear_max_iterations: 3
  nonlinear_tolerance: 1.0e-3
  backflow_stabilization_coefficient: 0.2
  linear_solver_max_iterations: 30
  ns_gm_max_iterations: 25
  ns_cg_max_iterations: 800
  linear_solver_tolerance: 1.0e-3
  ns_gm_tolerance: 1.0e-3
  ns_cg_tolerance: 1.0e-3
  rcr_initial_pressure_mmHg: 87.0
  inlet_profile: Parabolic
  outlet_bc: RCR
  mpi_np_default: 8
